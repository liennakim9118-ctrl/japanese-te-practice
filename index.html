<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b5bdb">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="て형 연습">
<link rel="manifest" href="manifest.json">
<title>일본어 て형 연습</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Segoe UI', 'Noto Sans KR', sans-serif;
  background: #f0f4f8;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  -webkit-text-size-adjust: 100%;
}

/* ── Header ── */
.header {
  background: #3b5bdb;
  color: white;
  padding: 12px 20px;
  padding-top: calc(12px + env(safe-area-inset-top));
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(59,91,219,0.3);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-size: clamp(15px, 4vw, 18px); font-weight: 700; letter-spacing: -0.3px; }
.score-display {
  font-size: clamp(11px, 3vw, 13px);
  opacity: 0.95;
  background: rgba(255,255,255,0.18);
  padding: 5px 12px;
  border-radius: 20px;
  white-space: nowrap;
}

/* ── Main scroll area ── */
.main {
  flex: 1;
  padding: 16px 14px;
  padding-bottom: calc(20px + env(safe-area-inset-bottom));
  max-width: 580px;
  margin: 0 auto;
  width: 100%;
}

/* ── Cards ── */
.card {
  background: white;
  border-radius: 18px;
  padding: clamp(18px, 5vw, 26px) clamp(16px, 5vw, 24px);
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  margin-bottom: 12px;
}

/* Given form badge */
.form-badge {
  display: inline-block;
  background: #eef2ff;
  color: #3b5bdb;
  border-radius: 8px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 12px;
  letter-spacing: 0.3px;
}

/* Verb display */
.verb-display {
  font-size: clamp(38px, 12vw, 54px);
  text-align: center;
  margin: 6px 0 16px;
  line-height: 2.4;
  font-family: 'Noto Sans JP', 'Yu Gothic', 'Meiryo', sans-serif;
  word-break: keep-all;
}
ruby rt {
  font-size: clamp(11px, 3vw, 14px);
  color: #888;
  font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
}

/* Question */
.question-text {
  font-size: clamp(14px, 3.8vw, 16px);
  color: #444;
  line-height: 1.75;
  margin-bottom: 16px;
}
.target-badge {
  display: inline-block;
  background: #fff3e0;
  color: #d84315;
  border-radius: 7px;
  padding: 4px 11px;
  font-size: clamp(12px, 3.5vw, 14px);
  font-weight: 700;
}

/* ── Input row ── */
.input-row { display: flex; flex-direction: column; gap: 10px; }

.answer-input {
  flex: 1;
  border: 2px solid #e0e0e0;
  border-radius: 12px;
  padding: 14px 16px;
  /* 16px 이상이어야 iOS에서 자동 확대 방지 */
  font-size: 18px;
  font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
  outline: none;
  transition: border-color 0.2s;
  background: #fafafa;
  color: #222;
  min-height: 54px;
  /* 모바일 자동완성/수정 비활성화 */
  -webkit-user-modify: read-write-plaintext-only;
}
.answer-input:focus { border-color: #3b5bdb; background: white; }
.answer-input.correct { border-color: #43a047; background: #f1f8e9; }
.answer-input.wrong   { border-color: #e53935; background: #fff5f5; }
.answer-input:disabled { opacity: 0.75; }

.submit-btn {
  background: #3b5bdb;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  min-height: 54px;
  min-width: 64px;
  transition: background 0.15s, transform 0.1s;
  touch-action: manipulation;
}
.submit-btn:active { background: #2f46ad; transform: scale(0.97); }

/* ── Result ── */
.result-card {
  border-radius: 16px;
  padding: clamp(16px, 4vw, 22px);
  margin-bottom: 12px;
  display: none;
}
.result-card.correct { background: #e8f5e9; border: 1.5px solid #66bb6a; }
.result-card.wrong   { background: #fff5f5; border: 1.5px solid #ef9a9a; }

.result-title { font-size: clamp(15px, 4vw, 17px); font-weight: 700; margin-bottom: 10px; }
.result-title.correct { color: #2e7d32; }
.result-title.wrong   { color: #c62828; }

.correct-answer {
  font-size: clamp(22px, 6vw, 30px);
  font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
  margin: 6px 0 12px;
  line-height: 2.2;
}

.explanation {
  font-size: clamp(13px, 3.5vw, 14.5px);
  color: #555;
  line-height: 1.8;
  border-top: 1px solid rgba(0,0,0,0.07);
  padding-top: 10px;
  margin-top: 4px;
}
.explanation b { color: #333; }
.note-warn { color: #e65100; font-weight: 600; margin-top: 6px; display: block; }

/* ── Next button ── */
.next-btn {
  width: 100%;
  background: #3b5bdb;
  color: white;
  border: none;
  border-radius: 14px;
  padding: 17px;
  font-size: clamp(14px, 4vw, 16px);
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  min-height: 54px;
  touch-action: manipulation;
  transition: background 0.15s, transform 0.1s;
}
.next-btn:active { background: #2f46ad; transform: scale(0.98); }

/* ── Bottom bar ── */
.bottom-bar { display: flex; gap: 10px; }
.icon-btn {
  flex: 1;
  background: white;
  border: 1.5px solid #e8e8e8;
  border-radius: 12px;
  padding: 13px 6px;
  font-size: clamp(11px, 3vw, 13px);
  cursor: pointer;
  color: #555;
  font-weight: 600;
  min-height: 48px;
  touch-action: manipulation;
  transition: background 0.1s, transform 0.1s;
}
.icon-btn:active { background: #f0f0f0; transform: scale(0.97); }

/* ── Modals ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: flex-end;       /* 모바일: 아래에서 올라오는 sheet */
  justify-content: center;
  padding: 0;
}
.modal-overlay.open { display: flex; }

.modal {
  background: white;
  border-radius: 24px 24px 0 0;
  padding: 28px 22px;
  padding-bottom: calc(28px + env(safe-area-inset-bottom));
  width: 100%;
  max-width: 600px;
  max-height: 88dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  animation: slideUp 0.25s ease;
}

/* 태블릿/데스크톱: 가운데 팝업 */
@media (min-width: 600px) {
  .modal-overlay { align-items: center; padding: 20px; }
  .modal { border-radius: 20px; max-height: 85vh; }
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}

/* drag handle */
.modal::before {
  content: '';
  display: block;
  width: 40px;
  height: 4px;
  background: #ddd;
  border-radius: 2px;
  margin: -8px auto 20px;
}
@media (min-width: 600px) { .modal::before { display: none; } }

.modal h2 { font-size: clamp(16px, 4vw, 18px); margin-bottom: 18px; color: #222; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: #777; margin-bottom: 5px; font-weight: 700; letter-spacing: 0.3px; }
.form-group input {
  width: 100%;
  border: 1.5px solid #e0e0e0;
  border-radius: 10px;
  padding: 12px 14px;
  font-size: 16px;   /* iOS 줌 방지 */
  font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
  outline: none;
  -webkit-appearance: none;
}
.form-group input:focus { border-color: #3b5bdb; }
.form-group input + input { margin-top: 6px; }

.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.modal-btns button {
  flex: 1;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-size: clamp(13px, 3.5vw, 15px);
  font-weight: 700;
  cursor: pointer;
  min-height: 50px;
  touch-action: manipulation;
}
.btn-cancel  { background: #eee; color: #555; }
.btn-confirm { background: #3b5bdb; color: white; }
.btn-confirm:active { background: #2f46ad; }

/* Stats */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 16px;
}
.stat-box { background: #f5f7ff; border-radius: 12px; padding: 14px 10px; text-align: center; }
.stat-num { font-size: clamp(24px, 7vw, 32px); font-weight: 700; color: #3b5bdb; }
.stat-label { font-size: 11px; color: #888; margin-top: 3px; }

.wrong-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f0f0f0; font-size:clamp(13px,3.5vw,15px); }
.wrong-count { color: #e53935; font-weight: 700; font-size: 13px; }

/* Settings checkboxes */
.check-label {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
  cursor: pointer;
  font-size: clamp(13px, 3.5vw, 15px);
  padding: 4px 0;
  min-height: 36px;
}
.check-label input[type=checkbox] {
  width: 20px; height: 20px;
  accent-color: #3b5bdb;
  cursor: pointer;
  flex-shrink: 0;
}
.check-sub { color: #888; font-size: clamp(11px, 3vw, 13px); }
.section-title { font-size: 13px; font-weight: 700; color: #555; margin: 18px 0 10px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ── Bookmark button ── */
.card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.card-top .form-badge { margin-bottom: 0; }
.bookmark-btn {
  background: none; border: none; font-size: 22px; line-height: 1;
  padding: 4px 6px; border-radius: 8px; cursor: pointer; opacity: 0.55;
  touch-action: manipulation; transition: transform 0.1s, opacity 0.15s;
}
.bookmark-btn:active { transform: scale(0.88); }

/* ── Review banner ── */
.review-banner {
  display: none; align-items: center; justify-content: space-between; gap: 10px;
  background: #fff3e0; color: #e65100; border: 1.5px solid #ffcc80;
  border-radius: 12px; padding: 10px 14px; margin-bottom: 12px;
  font-size: clamp(12px, 3.4vw, 14px); font-weight: 700;
}
.review-banner.on { display: flex; }
.review-banner button {
  background: #e65100; color: white; border: none; border-radius: 8px;
  padding: 8px 13px; font-size: 12px; font-weight: 700; cursor: pointer;
  white-space: nowrap; touch-action: manipulation;
}

/* ── Review list ── */
.review-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid #f0f0f0; gap: 10px;
}
.review-row .rv-main { font-size: clamp(13px, 3.6vw, 15px); }
.review-row .rv-sub { font-size: 11px; color: #888; margin-top: 3px; }
.rv-tag-wrong { color: #e53935; font-weight: 700; }
.rv-tag-mark  { color: #f9a825; font-weight: 700; }
.rv-del { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px 8px; flex-shrink: 0; }
.rv-del:active { color: #e53935; }
.empty-msg { color: #999; font-size: 14px; text-align: center; padding: 26px 6px; line-height: 1.7; }
.review-badge { color: #e65100; font-weight: 700; }

/* ── Add-verb: select & preview ── */
.form-group select {
  width: 100%; border: 1.5px solid #e0e0e0; border-radius: 10px;
  padding: 12px 14px; font-size: 16px; outline: none; background: white;
  -webkit-appearance: none; appearance: none; color: #222;
}
.form-group select:focus { border-color: #3b5bdb; }
.conj-preview {
  background: #f5f7ff; border-radius: 10px; padding: 11px 13px; margin: 4px 0 14px;
  font-size: clamp(11px, 3vw, 13px); color: #555; line-height: 1.8;
  font-family: 'Noto Sans JP', 'Yu Gothic', sans-serif;
}
.conj-preview:empty { display: none; }
.conj-preview b { color: #3b5bdb; }
.vrow-check { display: flex; align-items: center; flex-shrink: 0; }
.vrow-check input { width: 20px; height: 20px; accent-color: #3b5bdb; cursor: pointer; }
.review-row.off { opacity: 0.4; }
</style>
</head>
<body>

<div class="header">
  <h1>🇯🇵 て형 연습</h1>
  <div class="score-display" id="score-display">정답: 0 / 0</div>
</div>

<div class="main">

  <!-- Review mode banner -->
  <div class="review-banner" id="review-banner">
    <span id="review-banner-text">🔖 복습 모드</span>
    <button onclick="exitReview(false)">복습 종료</button>
  </div>

  <!-- Problem Card -->
  <div class="card" id="problem-card">
    <div class="card-top">
      <span class="form-badge" id="given-form-label">기본형</span>
      <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()" title="복습 목록에 저장">🔖</button>
    </div>
    <div class="verb-display" id="verb-display"></div>
    <div class="question-text" id="question-text"></div>
    <div class="input-row">
      <input
        type="text"
        class="answer-input"
        id="answer-input"
        placeholder="히라가나 또는 한자로 입력..."
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
      >
      <button class="submit-btn" id="submit-btn">확인</button>
    </div>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="result-card">
    <div class="result-title" id="result-title"></div>
    <div id="result-body"></div>
  </div>

  <!-- Next button -->
  <button class="next-btn" id="next-btn" style="display:none">다음 문제 →</button>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <button class="icon-btn" onclick="openReview()">🔖 복습 <span class="review-badge" id="review-badge"></span></button>
    <button class="icon-btn" onclick="openAddVerb()">＋ 동사</button>
    <button class="icon-btn" onclick="openStats()">📊 통계</button>
    <button class="icon-btn" onclick="openSettings()">⚙️ 설정</button>
  </div>

</div>

<!-- ───── Verb Manage Modal ───── -->
<div class="modal-overlay" id="modal-add">
  <div class="modal">
    <h2>＋ 내 동사 관리</h2>

    <div class="section-title">새 동사 추가 (기본형 입력 → 사전 자동완성·검증)</div>
    <div class="form-group">
      <label>기본형 — 히라가나 (필수, 예: のむ ／ 사전에 있으면 활용형 のみます·飲んで 도 인식)</label>
      <input id="a-dict-h" placeholder="のむ　← 기본형 권장 (활용형도 사전에 있으면 자동 환원)">
    </div>
    <div class="form-group">
      <label>기본형 — 한자 (사전에 있으면 자동완성, 예: 飲む)</label>
      <input id="a-dict-k" placeholder="飲む　← 자동완성 / 직접 입력도 가능">
    </div>
    <div class="form-group">
      <label>의미 (한국어, 필수)</label>
      <input id="a-meaning" placeholder="마시다" style="font-family:inherit">
    </div>
    <div class="form-group">
      <label>동사 그룹 (보통 '자동'으로 충분해요)</label>
      <select id="a-group">
        <option value="auto">자동 판별</option>
        <option value="1">1그룹 (う동사)</option>
        <option value="2">2그룹 (る동사)</option>
        <option value="3">3그룹 (する·くる)</option>
      </select>
    </div>
    <div class="conj-preview" id="a-preview"></div>
    <button class="btn-confirm" style="width:100%" onclick="confirmAddVerb()">＋ 추가</button>

    <div class="section-title">동사 목록 (체크 끄면 출제 제외 · 틀린 순)</div>
    <div id="verb-list"></div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeManage()">닫기</button>
    </div>
  </div>
</div>

<!-- ───── Stats Modal ───── -->
<div class="modal-overlay" id="modal-stats">
  <div class="modal">
    <h2>📊 오늘의 학습 통계 <span style="font-size:12px;color:#999;font-weight:400">(매일 00시 KST 초기화)</span></h2>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="st-total">0</div><div class="stat-label">총 문제</div></div>
      <div class="stat-box"><div class="stat-num" id="st-correct">0</div><div class="stat-label">정답</div></div>
      <div class="stat-box"><div class="stat-num" id="st-rate">0%</div><div class="stat-label">정답률</div></div>
      <div class="stat-box"><div class="stat-num" id="st-streak">0</div><div class="stat-label">연속 정답</div></div>
    </div>
    <div id="wrong-list"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-stats')">닫기</button>
      <button class="btn-confirm" style="background:#e53935" onclick="resetStats()">초기화</button>
    </div>
  </div>
</div>

<!-- ───── Settings Modal ───── -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal">
    <h2>⚙️ 설정</h2>
    <div class="section-title">연습할 파생 표현</div>
    <div id="deriv-checks"></div>
    <div class="section-title">주어진 형태 (문제 제시 방식)</div>
    <div id="given-checks"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-settings')">취소</button>
      <button class="btn-confirm" onclick="saveSettings()">저장 후 새 문제</button>
    </div>
  </div>
</div>

<!-- ───── Review Modal ───── -->
<div class="modal-overlay" id="modal-review">
  <div class="modal">
    <h2>🔖 복습 목록</h2>
    <div id="review-list"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('modal-review')">닫기</button>
      <button class="btn-confirm" id="start-review-btn" onclick="startReview()">복습 시작</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// VERB DATA
// ═══════════════════════════════════════════════════
const BASE_VERBS = [
  // ── Group 2 (る동사) ──
  { dict:{k:'見る',h:'みる'},        masu:{k:'見ます',h:'みます'},        nai:{k:'見ない',h:'みない'},        ta:{k:'見た',h:'みた'},        te:{k:'見て',h:'みて'},        meaning:'보다',             group:2 },
  { dict:{k:'食べる',h:'たべる'},     masu:{k:'食べます',h:'たべます'},     nai:{k:'食べない',h:'たべない'},     ta:{k:'食べた',h:'たべた'},     te:{k:'食べて',h:'たべて'},     meaning:'먹다',             group:2 },
  { dict:{k:'起きる',h:'おきる'},     masu:{k:'起きます',h:'おきます'},     nai:{k:'起きない',h:'おきない'},     ta:{k:'起きた',h:'おきた'},     te:{k:'起きて',h:'おきて'},     meaning:'일어나다',         group:2 },
  { dict:{k:'寝る',h:'ねる'},         masu:{k:'寝ます',h:'ねます'},         nai:{k:'寝ない',h:'ねない'},         ta:{k:'寝た',h:'ねた'},         te:{k:'寝て',h:'ねて'},         meaning:'자다',             group:2 },
  { dict:{k:'着る',h:'きる'},         masu:{k:'着ます',h:'きます'},         nai:{k:'着ない',h:'きない'},         ta:{k:'着た',h:'きた'},         te:{k:'着て',h:'きて'},         meaning:'입다',             group:2 },
  { dict:{k:'開ける',h:'あける'},     masu:{k:'開けます',h:'あけます'},     nai:{k:'開けない',h:'あけない'},     ta:{k:'開けた',h:'あけた'},     te:{k:'開けて',h:'あけて'},     meaning:'열다',             group:2 },

// ── 통계: 하루 단위 (KST 00시 리셋), 새로고침해도 유지 ──
function kstDateStr() {
  // epoch를 +9h 시프트한 뒤 UTC 날짜를 읽으면 = 한국 날짜
  return new Date(Date.now() + 9*3600*1000).toISOString().slice(0,10);
}
let stats = { date: kstDateStr(), total:0, correct:0, streak:0, wrongMap:{} };
try {
  const saved = JSON.parse(localStorage.getItem('jp_stats') || 'null');
  if (saved && saved.date === kstDateStr()) stats = saved;   // 오늘 기록만 복원
} catch(e) {}
function saveStats() { localStorage.setItem('jp_stats', JSON.stringify(stats)); }
function rolloverStats() {   // 날짜가 바뀌었으면 리셋
  if (stats.date !== kstDateStr()) {
    stats = { date: kstDateStr(), total:0, correct:0, streak:0, wrongMap:{} };
    saveStats();
    const sd = document.getElementById('score-display');
    if (sd) sd.textContent = '정답: 0 / 0';
  }
}

// ── 동사별 누적 통계(영구): { 'のむ': { k:'飲む', total, correct, wrong } } ──
let verbStats = {};
try { verbStats = JSON.parse(localStorage.getItem('jp_verb_stats') || '{}'); } catch(e) {}
function saveVerbStats() { localStorage.setItem('jp_verb_stats', JSON.stringify(verbStats)); }
function bumpVerbStat(verb, ok) {
  const h = verb.dict.h;
  if (!verbStats[h]) verbStats[h] = { k: verb.dict.k, total:0, correct:0, wrong:0 };
  verbStats[h].k = verb.dict.k;
  verbStats[h].total++;
  if (ok) verbStats[h].correct++; else verbStats[h].wrong++;
  saveVerbStats();
}

const rand = arr => arr[Math.floor(Math.random() * arr.length)];
const norm = s => s.trim().replace(/[\s　]/g,'');

function ruby(k, h) {
  if (!k || k === h) return h;
  return `<ruby>${k}<rt>${h}</rt></ruby>`;
}

function allVerbs() { return [...BASE_VERBS, ...customVerbs]; }

// ═══════════════════════════════════════════════════
// QUESTION
// ═══════════════════════════════════════════════════
function newQuestion() {
  rolloverStats();
  if (reviewMode) { newReviewQuestion(); return; }
  const verbs = quizVerbs();
  if (!verbs.length) {
    document.getElementById('given-form-label').textContent = '안내';
    document.getElementById('verb-display').innerHTML = '🚫';
    document.getElementById('question-text').innerHTML = '출제할 동사가 없어요.<br><b>＋ 동사</b> 목록에서 체크박스를 켜서 동사를 활성화해 주세요.';
    const inp = document.getElementById('answer-input');
    inp.value = ''; inp.disabled = true;
    document.getElementById('submit-btn').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    document.getElementById('result-card').style.display = 'none';
    return;
  }
  const verb  = rand(verbs);

  const enabledD = DERIVATIVES.filter(d => settings.derivs.includes(d.id));
  const enabledG = GIVEN_FORMS .filter(f => settings.givens.includes(f.id));
  if (!enabledD.length || !enabledG.length) return;

  const target    = rand(enabledD);
  const givenType = rand(enabledG);

  let givenKanji, givenKana, givenLabel;

  if (givenType.id === 'deriv') {
    const others = enabledD.filter(d => d.id !== target.id);
    const src = others.length ? rand(others) : null;
    if (src) {
      givenKanji = verb.te.k + src.suffix;
      givenKana  = verb.te.h + src.suffix;
      givenLabel = `${src.label}형 (${src.meaning})`;
    } else {
      givenKanji = verb.dict.k; givenKana = verb.dict.h; givenLabel = '기본형 (~한다)';
    }
  } else {
    givenKanji = verb[givenType.id].k;
    givenKana  = verb[givenType.id].h;
    givenLabel = givenType.desc ? `${givenType.label} (${givenType.desc})` : givenType.label;
  }

  cur = { verb, target };

  // Render
  document.getElementById('given-form-label').textContent = givenLabel;
  document.getElementById('verb-display').innerHTML = ruby(givenKanji, givenKana);
  document.getElementById('question-text').innerHTML =
    `<b>${verb.meaning}</b>을(를) 뜻하는 동사를<br>` +
    `<span class="target-badge">${target.label} &nbsp;(${target.meaning})</span>&nbsp; 으로 변환하세요.`;

  // Reset UI
  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.className = 'answer-input'; inp.disabled = false;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('result-card').className = 'result-card';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = '';
  updateBookmarkBtn();
  inp.focus();
}

// ═══════════════════════════════════════════════════
// ANSWER CHECK
// ═══════════════════════════════════════════════════
function checkAnswer() {
  const inp = document.getElementById('answer-input');
  const userAns = norm(inp.value);
  if (!userAns) { inp.focus(); return; }

  const { verb, target } = cur;
  const correctKana  = verb.te.h + target.suffix;
  const correctKanji = verb.te.k + target.suffix;
  const ok = (userAns === correctKana || userAns === correctKanji);

  stats.total++;
  bumpVerbStat(verb, ok);
  inp.disabled = true;
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('next-btn').style.display = '';

  const rc = document.getElementById('result-card');
  rc.style.display = 'block';

  const teDisplay = ruby(verb.te.k, verb.te.h);

  if (ok) {
    stats.correct++;
    stats.streak++;
    if (reviewMode) handleReviewCorrect();
    inp.className = 'answer-input correct';
    rc.className = 'result-card correct';
    document.getElementById('result-title').className = 'result-title correct';
    document.getElementById('result-title').textContent = '✅ 정답!';
    document.getElementById('result-body').innerHTML =
      `<div class="correct-answer">${ruby(correctKanji, correctKana)}</div>` +
      `<div class="explanation">` +
        `기본형: <b>${ruby(verb.dict.k, verb.dict.h)}</b> (${verb.meaning})<br>` +
        `${ruby(verb.dict.k, verb.dict.h)}의 て형 → <b>${teDisplay}</b><br>` +
        `${target.expl(teDisplay)}` +
        (verb.note ? `<span class="note-warn">${verb.note}</span>` : '') +
      `</div>`;
  } else {
    stats.streak = 0;
    stats.wrongMap[verb.dict.h] = (stats.wrongMap[verb.dict.h] || { k: verb.dict.k, cnt:0 });
    stats.wrongMap[verb.dict.h].cnt++;
    addWrong(verb, target);
    inp.className = 'answer-input wrong';
    rc.className = 'result-card wrong';
    document.getElementById('result-title').className = 'result-title wrong';
    document.getElementById('result-title').textContent = '❌ 오답';
    document.getElementById('result-body').innerHTML =
      `<div style="font-size:12px;color:#999;margin-bottom:2px">정답</div>` +
      `<div class="correct-answer">${ruby(correctKanji, correctKana)}</div>` +
      `<div class="explanation">` +
        `기본형: <b>${ruby(verb.dict.k, verb.dict.h)}</b> (${verb.meaning})<br>` +
        `${ruby(verb.dict.k, verb.dict.h)}의 て형 → <b>${teDisplay}</b><br>` +
        `${target.expl(teDisplay)}` +
        (verb.note ? `<span class="note-warn">${verb.note}</span>` : '') +
      `</div>`;
  }

  document.getElementById('score-display').textContent = `정답: ${stats.correct} / ${stats.total}`;
  saveStats();
}

  'る':{masu:'ります',nai:'らない',ta:'った',te:'って'},
};

function detectGroup(h) {
  if (h === 'する' || (h.length > 2 && h.endsWith('する'))) return 3;
  if (h === 'くる' || h === '来る') return 3;
  if (!h.endsWith('る')) return 1;
  const prev = h.slice(-2, -1);
  if ((ROW_I.has(prev) || ROW_E.has(prev)) && !G1_RU.has(h)) return 2;
  return 1;
}

// 기본형(히라가나 dictH, 한자 dictK)에서 masu/nai/ta/te 자동 생성. 실패 시 null
function conjugate(dictH, dictK, groupOpt) {
  if (!dictH) return null;
  dictK = dictK || dictH;
  const group = (groupOpt && groupOpt !== 'auto') ? Number(groupOpt) : detectGroup(dictH);
  const kStem = dictK.slice(0, -1), hStem = dictH.slice(0, -1);
  const mk = end => ({ k: kStem + end, h: hStem + end });
  let masu, nai, ta, te;

  if (group === 3) {
    if (dictH.endsWith('する')) {
      const bk = dictK.slice(0, -2), bh = dictH.slice(0, -2);
      masu={k:bk+'します',h:bh+'します'}; nai={k:bk+'しない',h:bh+'しない'};
      ta={k:bk+'した',h:bh+'した'};       te={k:bk+'して',h:bh+'して'};
    } else { // くる / 来る (읽기 변화 く/き/こ)
      masu={k:kStem+'ます',h:'きます'}; nai={k:kStem+'ない',h:'こない'};
      ta={k:kStem+'た',h:'きた'};       te={k:kStem+'て',h:'きて'};
    }
  } else if (group === 2) {
    masu=mk('ます'); nai=mk('ない'); ta=mk('た'); te=mk('て');
  } else { // 1그룹
    const last = dictH.slice(-1);
    let e = G1_END[last];
    if (!e) return null;
    if (dictH === 'いく' || dictK === '行く') e = { masu:'きます', nai:'かない', ta:'った', te:'って' }; // 예외
    masu=mk(e.masu); nai=mk(e.nai); ta=mk(e.ta); te=mk(e.te);
  }
  if (dictK === dictH) { [masu,nai,ta,te].forEach(f => f.k = f.h); }   // 한자 미입력 → k=h
  return { dict:{k:dictK,h:dictH}, masu, nai, ta, te, group };
}

const lookupVerb = h => VERB_DICT[h] || null;

// 활용형 → 기본형 역인덱스 (사전 동사 한정): 'のみます'·'飲んで'·'飲む' 입력 시 기본형 のむ로 인식
const CONJ_INDEX = (() => {
  const idx = {};
  const put = (key, base) => { if (key && !(key in idx)) idx[key] = base; };
  for (const [h, e] of Object.entries(VERB_DICT)) {
    const c = conjugate(h, e.k, String(e.g));
    if (!c) continue;
    [c.dict, c.masu, c.nai, c.ta, c.te].forEach(f => { put(f.h, h); put(f.k, h); });
  }
  return idx;
})();
// 입력값을 기본형(히라가나)으로 해석. 못 찾으면 null
const resolveBase = input => (VERB_DICT[input] ? input : (CONJ_INDEX[input] || null));

// 사전 조회 → 기본형/한자/그룹 자동 해석 (활용형 입력도 기본형으로 환원)
function resolveAdd() {
  const g = id => document.getElementById(id).value.trim();
  const raw = g('a-dict-h');
  const base = resolveBase(raw);
  const viaConj = !!(base && base !== raw);   // 활용형/한자 등 기본형이 아닌 입력으로 인식됨
  const dictH = base || raw;
  const entry = lookupVerb(dictH);
  const dictK = g('a-dict-k') || (entry ? entry.k : '') || dictH;
  const sel = document.getElementById('a-group').value;
  const groupOpt = sel !== 'auto' ? sel : (entry ? String(entry.g) : 'auto');
  const meaning = g('a-meaning') || (entry ? entry.m : '');
  return { raw, dictH, dictK, meaning, entry, viaConj, c: conjugate(dictH, dictK, groupOpt) };
}

function updatePreview() {
  const el = document.getElementById('a-preview');
  const dictH = document.getElementById('a-dict-h').value.trim();
  if (!dictH) { el.innerHTML = ''; return; }
  const { entry, viaConj, c } = resolveAdd();
  // 사전에 있으면 한자/의미 빈 칸 자동 완성
  if (entry) {
    const kBox = document.getElementById('a-dict-k'), mBox = document.getElementById('a-meaning');
    if (!kBox.value.trim()) kBox.value = entry.k;
    if (!mBox.value.trim()) mBox.value = entry.m;
  }
  if (!c) { el.innerHTML = '<span style="color:#e53935">자동 활용 실패 — 기본형(사전형)인지 확인하세요.</span>'; return; }
  const dup = allVerbs().some(v => v.dict.h === c.dict.h);
  let head;
  if (dup)                    head = `<span style="color:#e53935;font-weight:700">⚠️ 이미 있는 동사</span> ${ruby(c.dict.k, c.dict.h)} — 중복 추가 불가`;
  else if (entry && viaConj)  head = `<span style="color:#3b5bdb;font-weight:700">🔄 기본형 인식</span> ${ruby(c.dict.k, c.dict.h)} (${entry.m}) · <b>${GROUP_NAME[c.group]}</b>`;
  else if (entry)             head = `<span style="color:#2e7d32;font-weight:700">✓ 사전 확인</span> ${ruby(c.dict.k, c.dict.h)} (${entry.m}) · <b>${GROUP_NAME[c.group]}</b>`;
  else                        head = `<span style="color:#e65100;font-weight:700">ⓘ 사전에 없는 동사</span> — 입력값으로 추가 · <b>${GROUP_NAME[c.group]}</b>`;
  el.innerHTML = head + `<br>ます: ${c.masu.h} ・ ない: ${c.nai.h} ・ た: ${c.ta.h} ・ <b>て: ${c.te.h}</b>`;
}

function confirmAddVerb() {
  const { dictH, meaning, entry, c } = resolveAdd();
  if (!dictH) { alert('기본형 히라가나를 입력해 주세요. (예: のむ)'); return; }
  if (!c) { alert('활용형을 자동 생성하지 못했어요.\n기본형(사전형)을 히라가나로 입력했는지 확인해 주세요. (예: のむ, たべる)'); return; }
  if (!meaning) { alert('의미를 입력해 주세요.'); return; }
  // 중복 동사 차단 (기본+커스텀 통틀어 같은 기본형이 있으면 거부)
  if (allVerbs().some(v => v.dict.h === c.dict.h)) {
    alert(`'${c.dict.k}' (${c.dict.h}) 는 이미 목록에 있는 동사예요.\n중복으로 추가할 수 없습니다.`);
    return;
  }
  // 사전에 없으면 한 번 더 확인
  if (!entry && !confirm(`'${dictH}'는 내장 사전에 없는 동사예요.\n입력하신 내용(${GROUP_NAME[c.group]} · て형 ${c.te.h})으로 추가할까요?\n\n※ 그룹이 틀리면 '동사 그룹'에서 직접 선택하세요.`)) return;

  customVerbs.push({ dict:c.dict, masu:c.masu, nai:c.nai, ta:c.ta, te:c.te, meaning, group:c.group, custom:true });
  localStorage.setItem('jp_custom_verbs', JSON.stringify(customVerbs));

  ['a-dict-h','a-dict-k','a-meaning'].forEach(id => { document.getElementById(id).value = ''; });
  document.getElementById('a-group').value = 'auto';
  updatePreview();
  renderVerbList();
  alert(`"${c.dict.k}" 추가 완료! (${GROUP_NAME[c.group]} · て형 ${c.te.h})${entry ? '\n✓ 사전에서 확인된 동사예요.' : ''}`);
}

// ── 동사 목록: 기본 동사 + 내 동사 모두 (틀린 순) ──
function renderVerbList() {
  const list = document.getElementById('verb-list');
  const all = [
    ...BASE_VERBS.map(v => ({ v, custom:false, ci:-1 })),
    ...customVerbs.map((v, ci) => ({ v, custom:true, ci })),
  ];
  const rows = all.map(o => {
    const s = verbStats[o.v.dict.h] || { total:0, correct:0, wrong:0 };
    return { ...o, total:s.total, correct:s.correct, wrong:s.wrong };
  }).sort((a, b) => (b.wrong - a.wrong) || (b.total - a.total));

  list.innerHTML = rows.map(r => {
    const on = isVerbEnabled(r.v);
    return `
    <div class="review-row${on ? '' : ' off'}">
      <label class="vrow-check"><input type="checkbox" ${on ? 'checked' : ''} onchange="toggleVerbEnabled('${r.v.dict.h}')"></label>
      <div style="flex:1">
        <div class="rv-main">${ruby(r.v.dict.k, r.v.dict.h)} <span style="color:#888;font-weight:400">${r.v.meaning}</span>${r.custom ? ' <span style="color:#3b5bdb;font-size:11px;font-weight:700">내 동사</span>' : ''}</div>
        <div class="rv-sub">푼 <b>${r.total}</b> · 맞춤 <b style="color:#2e7d32">${r.correct}</b> · 틀림 <b style="color:#e53935">${r.wrong}</b></div>
      </div>
      ${r.custom ? `<button class="rv-del" onclick="deleteCustomVerb(${r.ci})" title="삭제">🗑️</button>` : ''}
    </div>`;
  }).join('');
}

// 출제 on/off 토글
function toggleVerbEnabled(h) {
  if (disabledVerbs.has(h)) disabledVerbs.delete(h); else disabledVerbs.add(h);
  localStorage.setItem('jp_disabled_verbs', JSON.stringify([...disabledVerbs]));
  verbSetDirty = true;
  renderVerbList();
}

// 동사 관리 모달 닫기: 출제 동사가 바뀌었으면 새 문제 생성
function closeManage() {
  closeModal('modal-add');
  if (verbSetDirty && !reviewMode) { verbSetDirty = false; newQuestion(); }
}

function deleteCustomVerb(i) {
  const v = customVerbs[i];
  if (!v) return;
  if (!confirm(`"${v.dict.k}" 동사를 목록에서 삭제할까요?`)) return;
  customVerbs.splice(i, 1);
  localStorage.setItem('jp_custom_verbs', JSON.stringify(customVerbs));
  renderVerbList();
}

// ── Stats ──
function openStats() {
  rolloverStats();
  document.getElementById('st-total').textContent   = stats.total;
  document.getElementById('st-correct').textContent = stats.correct;
  document.getElementById('st-rate').textContent    = stats.total ? Math.round(stats.correct/stats.total*100)+'%' : '0%';
  document.getElementById('st-streak').textContent  = stats.streak;

  const wrongs = Object.entries(stats.wrongMap)
    .map(([h,v]) => ({ h, k:v.k, cnt:v.cnt }))
    .sort((a,b) => b.cnt - a.cnt).slice(0,5);

  document.getElementById('wrong-list').innerHTML = wrongs.length
    ? `<div style="font-size:12px;color:#888;margin-bottom:8px;font-weight:600">자주 틀리는 동사 TOP 5</div>` +
      wrongs.map(w =>
        `<div class="wrong-row"><span>${ruby(w.k,w.h)}</span><span class="wrong-count">${w.cnt}회 오답</span></div>`
      ).join('')
    : '';

  document.getElementById('modal-stats').classList.add('open');
}

function resetStats() {
  if (!confirm('오늘 통계를 초기화하시겠습니까?')) return;
  stats = { date: kstDateStr(), total:0, correct:0, streak:0, wrongMap:{} };
  saveStats();
  document.getElementById('score-display').textContent = '정답: 0 / 0';
  closeModal('modal-stats');
}

// ── Settings ──

  document.getElementById('deriv-checks').innerHTML = DERIVATIVES.map(d =>

  document.getElementById('modal-settings').classList.add('open');

function saveSettings() {
  const dc = [...document.querySelectorAll('#deriv-checks input:checked')].map(c=>c.value);
  const gc = [...document.querySelectorAll('#given-checks input:checked')].map(c=>c.value);
  if (!dc.length) { alert('파생 표현을 최소 1개 선택하세요.'); return; }
  if (!gc.length) { alert('주어진 형태를 최소 1개 선택하세요.'); return; }
  settings = { derivs:dc, givens:gc };
  localStorage.setItem('jp_settings', JSON.stringify(settings));
  closeModal('modal-settings');
  newQuestion();
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════════
// REVIEW (복습)
// ═══════════════════════════════════════════════════
const targetLabel = tid => { const d = DERIVATIVES.find(x=>x.id===tid); return d ? d.label : tid; };

function updateReviewBadge() {
  const n = Object.keys(review).length;
  const b = document.getElementById('review-badge');
  if (b) b.textContent = n ? `(${n})` : '';
}

function updateBookmarkBtn() {
  const btn = document.getElementById('bookmark-btn');
  if (!cur.verb || !cur.target) { btn.textContent = '🔖'; btn.style.opacity = 0.55; return; }
  const it = review[rkey(cur.verb, cur.target)];
  const marked = !!(it && it.m);
  btn.textContent = marked ? '⭐' : '🔖';
  btn.style.opacity = marked ? 1 : 0.55;
}

// 오답 시 자동으로 복습 컬렉션에 추가 (오답 횟수 누적)
function addWrong(verb, target) {
  const k = rkey(verb, target);
  if (!review[k]) review[k] = { v: verb, t: target.id, w: 0, m: false };
  review[k].w++;
  saveReview();
  updateReviewBadge();
}

// 🔖 버튼: 현재 문제 태깅 토글
function toggleBookmark() {
  if (!cur.verb || !cur.target) return;
  const k = rkey(cur.verb, cur.target);
  if (review[k]) {
    review[k].m = !review[k].m;
    if (!review[k].m && review[k].w === 0) delete review[k];   // 오답기록 없고 태깅 해제 → 완전 삭제
  } else {
    review[k] = { v: cur.verb, t: cur.target.id, w: 0, m: true };
  }
  saveReview();
  updateBookmarkBtn();
  updateReviewBadge();
}

// 복습 모드에서 정답 시: 태깅 안 된 오답 문제는 마스터 처리(목록에서 제거)
function handleReviewCorrect() {
  const k = rkey(cur.verb, cur.target);
  const it = review[k];
  if (it && !it.m) {
    delete review[k];
    saveReview();
    reviewQueue = reviewQueue.filter(x => x !== k);
  }
  updateReviewBadge();
}

function openReview() {
  renderReviewList();
  document.getElementById('modal-review').classList.add('open');
}

function renderReviewList() {
  const keys = Object.keys(review);
  const list = document.getElementById('review-list');
  const startBtn = document.getElementById('start-review-btn');
  if (!keys.length) {
    list.innerHTML = '<div class="empty-msg">아직 저장된 복습 문제가 없어요.<br>문제를 <b>틀리거나</b> 🔖 버튼으로 <b>저장</b>하면 여기에 모입니다.</div>';
    startBtn.style.display = 'none';
    return;
  }
  startBtn.style.display = '';
  const rows = keys.map(k => ({ k, ...review[k] }))
    .sort((a,b) => (b.w - a.w) || (b.m - a.m));
  list.innerHTML = rows.map(r => {
    const v = r.v, tl = targetLabel(r.t);
    const tags = [];
    if (r.w) tags.push(`<span class="rv-tag-wrong">❌ ${r.w}회</span>`);
    if (r.m) tags.push(`<span class="rv-tag-mark">⭐ 저장</span>`);
    return `<div class="review-row">
      <div>
        <div class="rv-main">${ruby(v.dict.k, v.dict.h)} <span style="color:#3b5bdb">→ ${tl}</span></div>
        <div class="rv-sub">${v.meaning} &nbsp;·&nbsp; ${tags.join(' &nbsp; ')}</div>
      </div>
      <button class="rv-del" onclick="removeReviewItem('${r.k}')" title="삭제">🗑️</button>
    </div>`;
  }).join('');
}

function removeReviewItem(k) {
  delete review[k];
  saveReview();
  reviewQueue = reviewQueue.filter(x => x !== k);
  renderReviewList();
  updateReviewBadge();
}

function startReview() {
  const keys = Object.keys(review);
  if (!keys.length) return;
  reviewQueue = keys.slice();
  reviewMode = true;
  closeModal('modal-review');
  document.getElementById('review-banner').classList.add('on');
  newQuestion();
}

function newReviewQuestion() {
  reviewQueue = reviewQueue.filter(k => review[k]);   // 삭제된 항목 정리
  if (!reviewQueue.length) { exitReview(true); return; }

  const k = rand(reviewQueue);
  const it = review[k];
  const verb = it.v;
  const target = DERIVATIVES.find(d => d.id === it.t) || DERIVATIVES[0];
  cur = { verb, target };

  document.getElementById('review-banner-text').textContent = `🔖 복습 모드 · 남은 문제 ${reviewQueue.length}개`;
  document.getElementById('given-form-label').textContent = '기본형 (~한다)';
  document.getElementById('verb-display').innerHTML = ruby(verb.dict.k, verb.dict.h);
  document.getElementById('question-text').innerHTML =
    `<b>${verb.meaning}</b>을(를) 뜻하는 동사를<br>` +
    `<span class="target-badge">${target.label} &nbsp;(${target.meaning})</span>&nbsp; 으로 변환하세요.`;

  const inp = document.getElementById('answer-input');
  inp.value = ''; inp.className = 'answer-input'; inp.disabled = false;
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('result-card').className = 'result-card';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('submit-btn').style.display = '';
  updateBookmarkBtn();
  inp.focus();
}

function exitReview(completed) {
  reviewMode = false;
  reviewQueue = [];
  document.getElementById('review-banner').classList.remove('on');
  if (completed) alert('복습 완료! 틀렸던 문제를 모두 맞혔어요. 🎉\n(⭐ 저장한 문제는 목록에 그대로 남아있습니다.)');
  newQuestion();
}

document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => {
    if (e.target !== el) return;
    el.classList.remove('open');
    if (el.id === 'modal-add' && verbSetDirty && !reviewMode) { verbSetDirty = false; newQuestion(); }
  });
});

// ═══════════════════════════════════════════════════
// EVENTS & INIT
// ═══════════════════════════════════════════════════
document.getElementById('submit-btn').addEventListener('click', checkAnswer);
document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkAnswer(); });
document.getElementById('next-btn').addEventListener('click', newQuestion);

['a-dict-h','a-dict-k'].forEach(id => document.getElementById(id).addEventListener('input', updatePreview));
document.getElementById('a-group').addEventListener('change', updatePreview);

document.getElementById('score-display').textContent = `정답: ${stats.correct} / ${stats.total}`;
updateReviewBadge();
newQuestion();
</script>
</body>
</html>
